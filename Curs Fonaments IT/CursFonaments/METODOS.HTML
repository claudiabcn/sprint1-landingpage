              //🧵 MÉTODOS DE STRING

            charAt(i)	Devuelve la letra en la posición i.	"hola".charAt(1) → "o"
            substring(i, j)	Devuelve parte del texto desde i hasta antes de j.	"hola".substring(1, 3) → "ol"
            toLowerCase()	Pasa todo a minúsculas.	"HoLA".toLowerCase() → "hola"
            toUpperCase()	Pasa todo a mayúsculas.	"HoLA".toUpperCase() → "HOLA"
            split(separador)	Divide el string en partes y devuelve un array.	"hola mundo".split(" ") → ["hola","mundo"]
            trim()		Elimina espacios al inicio y final del texto

          // 📦 MÉTODOS DE ARRAY
          / reverse()	Invierte el orden de los elementos.	["a", "b"].reverse() → ["b", "a"]
          / join(separador)	Une los elementos en un string.	["h", "o", "l", "a"].join("") → "hola"

          //🔢 MÉTODO DE NUMBER
          / toFixed(n)	Redondea el número a n decimales y lo convierte en string.	3.14159.toFixed(2) → "3.14"

           // DECIMALES

              // SPLIT, JOIN Y REVERSE
      // "hola".split("") → ["h", "o", "l", "a"]
      //  .reverse() → ["a", "l", "o", "h"]
      //  .join("") → "aloh"

        const text = "hola mundo";
        const partes = text.split(" ");
        console.log(partes); // 👉 ["hola", "mundo"]

        const letras = ["h", "o", "l", "a"];
        const alReves = letras.reverse();
          console.log(alReves); // 👉 ["a", "l", "o", "h"]

        const letr = ["h", "o", "l", "a"];
        const tex = letr.join("");
          console.log(tex); // 👉 "hola"

        const nombre = "   Juan   ";
        const limpio = nombre.trim();
          console.log(limpio); // 👉 "Juan"

          //CHAR ART Y SUBSTRING
        charAt(i)	Devuelve el carácter en la posición i.
        substring(i, j)	Devuelve un pedazo del string desde i hasta j (sin incluir j).

        let texto = "hola";
