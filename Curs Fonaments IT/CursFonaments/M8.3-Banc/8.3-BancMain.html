<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Banco con cuentas y clientes</h1>

    <p id="mensaje"></p>

    <section id="alta">
      <h2>Dar de alta un cliente</h2>
      <label for="dniAlta">DNI:</label>
      <input type="text" id="dniAlta" placeholder="Número DNI" />
      <label for="nombreAlta">Nombre:</label>
      <input type="text" id="nombreAlta" placeholder="Nombre" />
      <label for="apellidoAlta">Apellido:</label>
      <input type="text" id="apellidoAlta" placeholder="Apellido" />
      <button onclick="crearCliente()">Crear cliente</button>
    </section>

    <section id="eliminar">
      <h2>Eliminar un cliente</h2>
      <label for="dniBaja">DNI:</label>
      <input type="text" id="dniBaja" placeholder="Número DNI" />
      <button onclick="eliminarCliente()">Eliminar cliente</button>
    </section>

    <section id="cuenta">
      <h2>Crear una cuenta</h2>
      <label for="dniCuenta">DNI:</label>
      <input type="text" id="dniCuenta" placeholder="Número DNI" />
      <label for="numeroCuenta">Número de cuenta:</label>
      <input type="text" id="numeroCuenta" placeholder="Número Cuenta" />
      <button onclick="crearCuenta()">Crear cuenta</button>
    </section>
    <section id="Ingresar">
      <h2>Ingresar dinero en cuenta</h2>
      <label for="dniIngreso">DNI:</label>
      <input type="text" id="dniIngreso" placeholder="Número DNI" />
      <label for="cuentaIngreso">Número de cuenta:</label>
      <input type="text" id="cuentaIngreso" placeholder="Número de cuenta" />
      <label for="dineroIngresar">Cantidad(€):</label>
      <input
        type="number"
        id="dineroIngresar"
        placeholder="Dinero a Ingresar"
      />
      <button onclick="ingresarDinero()">Ingresar dinero</button>
    </section>
    <section id="retirar">
      <h2>Retirar dinero en cuenta</h2>
      <label for="dniRetiro">DNI:</label>
      <input type="text" id="dniRetiro" placeholder="Número DNI" />
      <label for="cuentaRetiro">Número de cuenta:</label>
      <input type="text" id="cuentaRetiro" placeholder="Número de cuenta" />
      <label for="dineroretirar">Cantidad(€):</label>
      <input type="number" id="dineroRetirar" placeholder="Dinero a retirar" />
      <button onclick="retirarDinero()">Retirar dinero</button>
    </section>
    <script src="8.3-Banc.js"></script>
    <script src="funcions.js"></script>
  </body>
</html>
