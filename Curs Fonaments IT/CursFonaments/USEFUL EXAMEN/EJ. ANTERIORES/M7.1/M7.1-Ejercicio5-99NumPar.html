<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="button" value="Mostrar los números" onclick="Ver()" />
    <p id="s"></p>
    <script>
      function Ver() {
        let nums = [];
        let i;
        for (i = 100; i >= 0; i = i - 2) {
          nums.push(i);
        }
        document.getElementById("s").innerHTML = nums;
      }
    </script>
  </body>
</html>
