<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="number" id="n1" />
    <input type="button" value="Fibonacci" onclick="fibon()" />
    <p id="show"></p>

    <script>
      function fibon() {
        const fibArray = [0, 1];
        let number = parseInt(document.getElementById("n1").value);

        for (let i = 0; i < number - 2; i++) {
          fibArray.push(fibArray[i] + fibArray[i + 1]);
        }

        for (let i = 0; i < fibArray.length; i++) {
          if (number == fibArray[i]) {
            document.getElementById(
              "show"
            ).innerHTML = `El número ${number} està dins de la sèrie de Fibonacci per a aquest nombre i és ${fibArray}.`;
          } else {
            i++;
          }
        }
      }
    </script>
  </body>
</html>
