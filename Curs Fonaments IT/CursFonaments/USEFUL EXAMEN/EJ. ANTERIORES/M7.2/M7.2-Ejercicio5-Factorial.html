<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="number" id="n1" />
    <input type="button" value="Calcular factorial" onclick="factorial()" />
    <p id="show"></p>
    <script>
      function factorial() {
        let i = 0;
        let factorial = 1;
        let num1 = parseInt(document.getElementById("n1").value);

        if (num1 < 0) {
          alert("El número tiene que ser positivo");
        }
        for (i = 0; i < num1; i++) {
          factorial = factorial * (i + 1);
        }
        document.getElementById(
          "show"
        ).innerHTML = `El factorial de ${num1} es ${factorial}.`;
      }
    </script>
  </body>
</html>
