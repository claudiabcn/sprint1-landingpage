<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <input type="number" id="a" />
  <input type="button" value="Es bisiesto" onclick="bisiesto()" />
  <p id="s"></p>
  <body>
    <script>
      function bisiesto() {
        let year = parseInt(document.getElementById("a").value);

        if (year % 400 == 0 || (year % 4 == 0 && year % 100 != 0)) {
          msj = "Es bisiesto.";
        } else {
          msj = "No es bisiesto.";
        }
        document.getElementById("s").innerHTML = msj;
      }
    </script>
  </body>
</html>

L’usuari/ària introdueix un any “a” per teclat i el programa crida a una funció
que indiqui si l’any és de traspàs o no.
