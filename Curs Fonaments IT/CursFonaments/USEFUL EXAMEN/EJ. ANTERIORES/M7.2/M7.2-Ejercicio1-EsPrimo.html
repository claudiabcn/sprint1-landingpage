<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <p>Introduzca un número</p>

    <button onclick="esPrimo()">Try it</button>

    <div id="datos"></div>
    <script>
      function esPrimo() {
        var primo = false;
        var numero = prompt("Escoge un número: ");
        if (numero > 1) {
          primo = validarPrimo(numero);
        }
        alert(primo);
      }

      function validarPrimo(numero) {
        let primo = true;
        let i = 2;
        while (primo && i < numero) {
          if (numero % i == 0) {
            primo = false;
          }
          i++;
        }
        return primo;
      }
    </script>
  </body>
</html>
